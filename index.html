<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<title>VocaReflex Ultimate Pro</title>

<style>

:root{
--bg:#f0f4f8;
--primary:#3b82f6;
--error:#ef4444;
--text:#1e293b;
--success:#58cc02;
--streak:#15803d;
}

body{
font-family:system-ui,-apple-system,sans-serif;
background:var(--bg);
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
color:var(--text);
margin:0;
user-select:none;
}

.header{
background:white;
border-radius:24px;
padding:20px;
width:100%;
max-width:520px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
text-align:center;
}

.stat{
font-size:11px;
font-weight:700;
color:#64748b;
text-transform:uppercase;
}

.stat span{
display:block;
font-size:22px;
color:var(--text);
margin-top:4px;
}

#streak{
color:var(--streak);
text-shadow:0 2px 6px rgba(0,0,0,.15);
}

.rank-dot{
width:17px;
height:17px;
border-radius:50%;
margin:12px auto 0;
background:#cd7f32;
box-shadow:0 0 0 3px rgba(0,0,0,.05);
}

#timer{
font-size:clamp(28px,6vw,34px);
font-weight:700;
color:var(--error);
margin-bottom:16px;
letter-spacing:1px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
justify-content:center;
width:100%;
max-width:480px;
}

.word{
background:white;
padding:10px 12px;
border-radius:10px;
border:2px solid #e5e7eb;
box-shadow:0 2px 0 #e5e7eb;
cursor:pointer;
font-size:15px;
line-height:1.25;
display:flex;
align-items:center;
justify-content:center;
min-height:48px;
transition:all .2s;
text-align:center;
}

.selected{
border-color:var(--primary);
background:#ebf5ff;
transform:scale(1.05);
}

.correct{
background:var(--success)!important;
color:white;
border-color:var(--success);
opacity:0;
transform:scale(.8);
pointer-events:none;
}

.wrong{
border-color:var(--error);
color:var(--error);
animation:shake .4s;
}

@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-6px)}
75%{transform:translateX(6px)}
}

#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999;
}

#rank-banner{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.6);
font-size:64px;
font-weight:900;
pointer-events:none;
opacity:0;
z-index:1000;
text-shadow:0 8px 30px rgba(0,0,0,.35);
transition:all .6s cubic-bezier(.2,.8,.2,1);
}

#rank-banner.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

</style>

</head>

/* AUDIO */

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function playSound(freq,d,type="sine",vol=.3){
const o=audioCtx.createOscillator();
const g=audioCtx.createGain();
o.frequency.value=freq;
o.type=type;
g.gain.setValueAtTime(vol,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+d);
o.connect(g);
g.connect(audioCtx.destination);
o.start();
o.stop(audioCtx.currentTime+d);
}

/* BOOM WIN */

function boomWin(){
[900,1200,1600,2200].forEach((f,i)=>{
setTimeout(()=>playSound(f,.7,"triangle",.9),i*170);
});
}

/* FIREWORKS */

function fireworks(){

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];

for(let i=0;i<120;i++){
p.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-.5)*18,
vy:(Math.random()-.5)*18,
life:70,
color:`hsl(${Math.random()*360},100%,60%)`
});
}

let anim=setInterval(()=>{

ctx.clearRect(0,0,canvas.width,canvas.height);

p.forEach(a=>{
a.x+=a.vx;
a.y+=a.vy;
a.vy += 0.3;
a.life--;

ctx.fillStyle=a.color;
ctx.beginPath();
ctx.arc(a.x,a.y,3,0,Math.PI*2);
ctx.fill();
});

p=p.filter(a=>a.life>0);

if(!p.length){
clearInterval(anim);
ctx.clearRect(0,0,canvas.width,canvas.height);
}

},16);
}

/* RANK BANNER */

function showRank(rank){

const banner=document.getElementById("rank-banner");

const names=[
"",
"BRONZE",
"SILVER",
"GOLD",
"PLATINUM",
"DIAMOND"
];

const colors=[
"",
"#cd7f32",
"#c0c0c0",
"#ffd700",
"#e5e4e2",
"#00e5ff"
];

banner.innerText=names[rank];
banner.style.color=colors[rank];

banner.classList.add("show");

setTimeout(()=>{
banner.classList.remove("show");
},2000);

}

const dict={};
VOCAB.forEach(v=>dict[v.en]=v.vi);

/* STATE */

let state={
stats:JSON.parse(localStorage.getItem("stats"))||{streak:0,lastStudy:""},
cards:JSON.parse(localStorage.getItem("cards"))||{},
selection:null,
wrongList:[]
};

VOCAB.forEach(v=>{
if(!state.cards[v.en])state.cards[v.en]={reps:0,last:0};
});

let timer,timeLeft=10;
let boomMode=false;

let queue=[];
let lastRank=null;


/* STREAK SYSTEM */

function updateStreak(){

let today=new Date().toDateString();

if(!state.stats.lastStudy){

state.stats.streak=1;
state.stats.lastStudy=today;

}else{

let last=new Date(state.stats.lastStudy);
let diff=(new Date(today)-last)/(1000*60*60*24);

if(diff===1){
state.stats.streak++;
state.stats.lastStudy=today;
}

else if(diff>1){
state.stats.streak=1;
state.stats.lastStudy=today;
}

}

save();

}


/* LEVEL */

function getCardLevel(c){
if(c.reps===0)return 0;
if(c.reps===1)return 1;
if(c.reps===2)return 2;
if(c.reps===3)return 3;
if(c.reps===4)return 4;
return 5;
}

/* COOLDOWN */

const cooldown=[
0,
10*60*1000,
30*60*1000,
24*60*60*1000,
72*60*60*1000,
120*60*60*1000
];

// decay mastered sau 60 ngày
const decayTime = 60*24*60*60*1000;

/* SHUFFLE */

function shuffle(a){
let arr=[...a];
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

/* POOL */

function getPool(){

let now=Date.now();
let groups=[[],[],[],[],[],[]];

VOCAB.forEach(v=>{

let c=state.cards[v.en];

// hạ cấp mastered sau 60 ngày
if(c.reps>=5 && now-c.last>decayTime){
 c.reps=4;
 c.last=now;
}

let lvl=getCardLevel(c);

if(now-c.last>=cooldown[lvl]){
groups[lvl].push(v);
}
});

let pool=[
...shuffle(groups[0]).slice(0,12),
...shuffle(groups[1]).slice(0,8),
...shuffle(groups[2]).slice(0,6),
...shuffle(groups[3]).slice(0,5),
...shuffle(groups[4]).slice(0,4),
...shuffle(groups[5]).slice(0,5)
];

if(pool.length < 40){

 let priority = [
  ...shuffle(groups[0]),
  ...shuffle(groups[1]),
  ...shuffle(groups[2]),
  ...shuffle(groups[3]),
  ...shuffle(groups[4]),
  ...shuffle(groups[5])
 ];

 for(let v of priority){
  if(pool.length >= 40) break;
  if(!pool.includes(v)) pool.push(v);
 }

}

return shuffle(pool);

}

/* TIMER */

function startTimer(){

clearInterval(timer);

timeLeft=boomMode?8:10;

const t=document.getElementById("timer");

t.innerText=(boomMode?"💣 ":"")+timeLeft;

timer=setInterval(()=>{

timeLeft--;

t.innerText=(boomMode?"💣 ":"")+timeLeft;

if(timeLeft<=0){

clearInterval(timer);

navigator.vibrate?.([100,50,100]);

document.querySelectorAll(".word:not(.correct)").forEach(c=>{
VOCAB.forEach(v=>{
if(v.en===c.innerText||v.vi===c.innerText){
state.cards[v.en].reps=Math.max(0,state.cards[v.en].reps-1);
state.cards[v.en].last=Date.now();
if(!state.wrongList.includes(v.en))state.wrongList.push(v.en);
}
});
});

save();
setTimeout(render,500);

}

},1000);
}

/* RENDER */

function render(){

state.selection=null;

const board=document.getElementById("board");
board.innerHTML="";

let mastered=Object.values(state.cards).filter(c=>c.reps>=5).length;

boomMode=mastered>20&&Math.random()<0.18;

if(queue.length<6){
queue=shuffle(getPool());
}

let round=queue.splice(0,6);


// nhắc lại tất cả từ sai ở round kế tiếp
if(state.wrongList.length){

let wrongCards = state.wrongList
.map(w=>VOCAB.find(v=>v.en===w))
.filter(v=>v);

wrongCards.forEach((card,i)=>{
if(i<round.length && !round.includes(card)){
round[i] = card;
}
});

state.wrongList=[];
}

const en=shuffle(round.map(v=>v.en));
const vi=shuffle(round.map(v=>v.vi));

for(let i=0;i<6;i++){
createCard(en[i],"en",board);
createCard(vi[i],"vi",board);
}

startTimer();
updateUI();
}

/* CARD */

function createCard(text,type,parent){

const div=document.createElement("div");

div.className="word";
div.innerText=text;

div.onclick=()=>clickCard(div,text,type);

parent.appendChild(div);
}

function clickCard(el,text,type){

playSound(400,.05);

if(!state.selection){
state.selection={el,text,type};
el.classList.add("selected");
return;
}

let first=state.selection;

if(first.type===type){
first.el.classList.remove("selected");
state.selection={el,text,type};
el.classList.add("selected");
return;
}

let currentEn = (type==="en") ? text : first.text;
let currentVi = (type==="vi") ? text : first.text;

let isCorrect = VOCAB.some(v => v.en === currentEn && v.vi === currentVi);

if(isCorrect){

playSound(900,.15);

el.classList.add("correct");
first.el.classList.add("correct");

state.cards[currentEn].reps++;
state.cards[currentEn].last=Date.now();

state.selection=null;

if(!document.querySelectorAll(".word:not(.correct)").length){

clearInterval(timer);

if(boomMode){
boomWin();
fireworks();
setTimeout(render,2200);
}else{
setTimeout(render,500);
}

}

}else{

navigator.vibrate?.(50);

playSound(120,.2,"square");

el.classList.add("wrong");
first.el.classList.add("wrong");

state.cards[currentEn].reps=0;
state.cards[currentEn].last=Date.now();

if(!state.wrongList.includes(currentEn))state.wrongList.push(currentEn);

setTimeout(()=>{
el.classList.remove("wrong");
first.el.classList.remove("wrong","selected");
state.selection=null;
},300);

}

save();
}

/* UI */

function updateUI(){

document.getElementById("streak").innerText=state.stats.streak;

let mastered=Object.values(state.cards).filter(c=>c.reps>=5).length;

document.getElementById("mastered").innerText=mastered;

const dot=document.getElementById("rank-dot");

let rank=0;

if(mastered<1000){
dot.style.background="#cd7f32";
rank=1;
}
else if(mastered<2500){
dot.style.background="#c0c0c0";
rank=2;
}
else if(mastered<4500){
dot.style.background="#ffd700";
rank=3;
}
else if(mastered<7000){
dot.style.background="#e5e4e2";
rank=4;
}
else{
dot.style.background="#00e5ff";
rank=5;
}

if(lastRank!==null && rank>lastRank){
boomWin();
fireworks();
}

lastRank=rank;

}

function save(){

localStorage.setItem("cards",JSON.stringify(state.cards));
localStorage.setItem("stats",JSON.stringify(state.stats));

}

updateStreak();
render();
